<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – AVERNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-admin">

  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <img src="images/logo.jpg" alt="AVERNA" class="login-logo" />
      <h2>Accès Administrateur</h2>
      <p>Entrez le mot de passe pour accéder au tableau de bord</p>
      <div class="form-group">
        <label for="adminPassword">Mot de passe</label>
        <input type="password" id="adminPassword" placeholder="Mot de passe..." />
        <span class="form-error" id="login-err"></span>
      </div>
      <button class="btn btn-green btn-full" id="loginBtn">Se connecter</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <!-- ADMIN HEADER -->
    <header class="admin-header">
      <div class="admin-header-inner">
        <img src="images/logo.jpg" alt="AVERNA" class="admin-logo" />
        <span class="admin-title">Tableau de bord</span>
        <button class="btn btn-outline btn-sm" id="logoutBtn">Déconnexion</button>
      </div>
    </header>

    <div class="admin-body">

      <!-- STATS -->
      <div class="admin-stats">
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="totalCount">–</span>
          <span class="admin-stat-label">Total inscrits</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="enAttenteCount">–</span>
          <span class="admin-stat-label">En attente</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="contacteCount">–</span>
          <span class="admin-stat-label">Contactés</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-num" id="abonneCount">–</span>
          <span class="admin-stat-label">Abonnés</span>
        </div>
      </div>

      <!-- FILTRES ET ACTIONS -->
      <div class="admin-toolbar">
        <div class="admin-filters">
          <select id="filterQuartier" class="filter-select">
            <option value="">Tous les arrondissements</option>
            <option value="1er – Makélékélé">1er – Makélékélé</option>
            <option value="2ème – Bacongo">2ème – Bacongo</option>
            <option value="3ème – Poto-Poto">3ème – Poto-Poto</option>
            <option value="4ème – Moungali">4ème – Moungali</option>
            <option value="5ème – Ouenzé">5ème – Ouenzé</option>
            <option value="6ème – Talangaï">6ème – Talangaï</option>
            <option value="7ème – Mfilou">7ème – Mfilou</option>
            <option value="8ème – Madibou">8ème – Madibou</option>
          </select>
          <select id="filterStatut" class="filter-select">
            <option value="">Tous les statuts</option>
            <option value="En attente">En attente</option>
            <option value="Contacté">Contacté</option>
            <option value="Abonné">Abonné</option>
          </select>
          <button class="btn btn-outline btn-sm" id="resetFilters">Réinitialiser</button>
        </div>
        <button class="btn btn-yellow" id="exportCSV">⬇ Exporter CSV</button>
      </div>

      <!-- TABLEAU -->
      <div class="table-wrapper">
        <table class="admin-table" id="adminTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Nom complet</th>
              <th>Téléphone</th>
              <th>Arrondissement</th>
              <th>Bac</th>
              <th>Fréquence</th>
              <th>Statut</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" class="table-empty">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
